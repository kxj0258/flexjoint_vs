serial:
  motor_port: "/dev/ttyUSB0"
  # Optional platform-specific overrides. If present, the program picks the
  # matching one at runtime; motor_port remains the fallback.
  linux_port: "/dev/ttyUSB0"
  windows_port: "COM8"
  baud_rate: 115200

camera:
  index: 0
  fps: 110
  width: 640
  height: 480

control:
  K1: 1.42
  B: 0.000049
  K2: 0.001
  Gamma: 0.0001
  K4: 2.7
  eps: 0.1
  Kq: 50.0
  cmd_c1: 1.0
  cmd_c2: 0.325
  K_dtk_I: 0.8
  omega_dtk: 0.6
  h: 0.04
  Mr: 1.0
  Jm: 1.0
  Kp: 5.0
  Kd: 0.35
  Ps: [10.0, 15.0, 10.0, 6.0]
  mu_rho: [0.01, 0.0001, 0.01, 0.001, 0.001]

vision:
  desired_coords: [264.5, 96.5, 298.5, 166.5, 174.5, 144.5]
  save_path: "data/frames/"
  hough_param1: 100
  hough_param2: 38
  hough_min_radius: 3
  hough_max_radius: 80

robot:
  L: 0.3
  rt_e1: [0.06, -0.055, 0.0]
  rt_e2: [0.075, 0.075, 0.0]
  initial_angle_rad: -0.185
  encoder_zero_offset_deg: 134.539
  # fx, fy, cx, cy
  camera_intrinsics: [487.05, 487.05, 338.23, 231.89]
  # row-major 3x4 extrinsic matrix (rows 0-2, cols 0-3)
  camera_extrinsics: [
    -0.0561, -0.9962, -0.0673,  0.0015,
     0.9981, -0.0577,  0.0208, -0.4200,
    -0.0246, -0.0660,  0.9975,  0.4523
  ]
