serial:
  motor_port: "/dev/ttyACM0"
  # Optional platform-specific overrides. If present, the program picks the
  # matching one at runtime; motor_port remains the fallback.
  linux_port: "/dev/ttyACM0"
  windows_port: "COM13"
  baud_rate: 115200

camera:
  index: 2
  fps: 60
  width: 640
  height: 480

camera_controls:
  # Linux/V4L2 only. Order matters for controls that depend on auto/manual mode.
  auto_exposure: 3
  exposure_time_absolute: 157
  white_balance_automatic: 1
  gain: 30
  brightness: 18
  contrast: 34
  saturation: 64
  gamma: 100
  sharpness: 2
  backlight_compensation: 1

control:
  K1: 1.42
  B: 0.000049
  K2: 0.001
  Gamma: 0.0001
  K4: 1.0
  eps: 0.1
  Kq: 50.0
  cmd_c1: 1.0
  cmd_c2: 0.6
  K_dtk_I: 0.8
  omega_dtk: 0.6
  h: 0.04
  Mr: 1.0
  Jm: 1.0
  Kp: 5.0
  Kd: 0.37
  Ps: [10.0, 15.0, 10.0, 6.0]
  mu_rho: [0.01, 0.0001, 0.01, 0.001, 0.001]

vision:
  # feature_count supports 2, 3, or 4. desired_coords must contain 2*N values
  # ordered exactly like the selected circles:
  #   N=2: point1=small radius, point2=large radius
  #   N=3: legacy order, point1=middle radius, point2=largest, point3=smallest
  #   N=4: point1=second-smallest, point2=second-largest,
  #        point3=smallest, point4=largest
  feature_count: 4
  # feature_count=2 example: desired_coords: [u1, v1, u2, v2]
  # desired_coords: [266.5, 120.5, 301.5, 203.5, 172.5, 162.5]
  # desired_coords: [223.5, 95.5, 246.5, 183.5, 122.5, 120.5]
  desired_coords: [257.5,107.5, 281.5, 194.5, 160.6,134.5, 198.5,208.5]
  # desired_coords: [229.5, 92.5, 243.5, 181.5, 129.5, 107.5, 158.5, 187.5]
  save_path: "data/frames/"
  hough_dp: 1.02
  hough_min_dist: 30.0
  hough_param1: 150
  hough_param2: 30
  hough_min_radius: 10
  hough_max_radius: 32
  blur_kernel: 7
  blur_sigma: 3.3
  equalize_hist: false

motor_protocol:
  address: 0x01
  sequence: 0x00
  feedback_command: 0x0B
  strict_address: false
  consume_command_response: true
  debug_frames: false
  # Existing controller code uses this command for velocity frames.
  velocity_command: 0x54
  # RS485 V2.3: 0x55 为绝对位置闭环控制命令。
  position_command: 0x55
  pid_command: -1
  position_counts_per_rev: 16384
  pid_scale: 1000

task:
  enable_completion_check: true
  image_error_tolerance_px: 3.0
  velocity_tolerance_rad_s: 0.1
  stable_frames_required: 150
  max_runtime_s: 30.0
  max_control_cycles: 600
  return_to_zero_on_exit: true
  # motor_pos_rad matches motor_test command "pos 0"; joint_rad uses
  # encoder_zero_offset_deg to return to a joint angle.
  return_zero_mode: "motor_pos_rad"
  return_zero_joint_rad: 0.0
  return_zero_motor_pos_rad: 0.0
  return_to_zero_timeout_s: 8.0
  max_vision_failures: 30
  max_feedback_failures: 30
  velocity_saturation_rad_s: 1.5
  min_safe_angle_rad: -1.0
  max_safe_angle_rad: 1.0
  vision_boundary_margin_px: 25.0

log:
  root_dir: "data/log"

video:
  save_raw_video: true
  save_annotated_video: true
  raw_filename: "raw_video.mp4"
  annotated_filename: "annotated_video.mp4"
  codec: "mp4v"

experiment:
  controller_mode: "proposed"

robot:
  L: 0.3
  rt_e1: [0.06, -0.055, 0.0]
  rt_e2: [0.075, 0.075, 0.0]
  rt_e3: [0.115, 0.0, 0.0]
  # feature_offsets order must match vision point numbering:
  # N=2 requires at least the first 2 offsets; N=4 requires all 4 offsets.
  # point1=[0,0,0], point2=rt_e1, point3=rt_e2, point4=rt_e3.
  feature_offsets:
    - [0.0, 0.0, 0.0]
    - [0.06, -0.055, 0.0]
    - [0.075, 0.075, 0.0]
    - [0.115, 0.0, 0.0]
  initial_angle_rad: -0.185
  encoder_zero_offset_deg: 10.621692
  # fx, fy, cx, cy
  camera_intrinsics: [487.05, 487.05, 338.23, 231.89]
  # row-major 3x4 extrinsic matrix (rows 0-2, cols 0-3)
  camera_extrinsics: [
    -0.0561, -0.9962, -0.0673,  0.0015,
     0.9981, -0.0577,  0.0208, -0.4200,
    -0.0246, -0.0660,  0.9975,  0.4523
  ]
